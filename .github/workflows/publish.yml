name: publish

# Fires when a `v*` tag is pushed to origin — the explicit "make public"
# moment in the release flow (see .claude/commands/publish.md). The same
# SHA has already been tested by `bun run ci` locally (via `/publish`) and
# by `ci.yml` on the preceding push to main, so this workflow's only job
# is to verify the tag ↔ version agreement and publish to npm via Trusted
# Publishing (OIDC, no long-lived token).
#
# Setup (one-time, on the npm side):
#   npmjs.com → Packages → @blueshed/delta → Publishing access →
#     Add trusted publisher → GitHub Actions → repo: blueshed/delta,
#     workflow: .github/workflows/publish.yml.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write   # lets the runner request an OIDC token for npm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing needs npm 11.5.1+; Node 22's bundled npm is older.
      # `npm install -g npm@latest` hits a self-upgrade MODULE_NOT_FOUND race
      # on hosted runners, so go through corepack which sidesteps it.
      - name: Activate latest npm via corepack
        run: |
          corepack enable
          corepack prepare npm@latest --activate
          npm --version

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --access public --provenance
