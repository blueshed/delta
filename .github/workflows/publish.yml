name: publish

# Fires when a `v*` tag is pushed to origin — the explicit "make public"
# moment in the release flow (see .claude/commands/publish.md). Runs the
# same CI gate as ci.yml, verifies the tag matches package.json, then
# publishes to npm via Trusted Publishing (OIDC, no long-lived token).
#
# Setup (one-time, on the npm side):
#   npmjs.com → Packages → @blueshed/delta → Publishing access →
#     Add trusted publisher → GitHub Actions → repo: blueshed/delta,
#     workflow: .github/workflows/publish.yml.
#   No NPM_TOKEN secret is needed; the OIDC token requested by
#   `permissions: id-token: write` below is what npm trusts.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write   # lets the runner request an OIDC token for npm

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Postgres
        run: docker compose up -d --wait

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test tests/

      - name: Stop Postgres
        if: always()
        run: docker compose down -v

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing requires npm 11.5.1+; Node 22 still ships 10.x.
      - name: Upgrade npm for Trusted Publishing support
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --access public --provenance
