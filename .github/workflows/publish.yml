name: Publish to npm

# Matches the pattern proven in @blueshed/railroad: fires when a GitHub
# Release is published, runs the full CI gate inline, then publishes via
# npm Trusted Publishing (OIDC).
#
# Release flow:
#   /publish <level>                     → commits + tags locally
#   git push origin main --follow-tags   → pushes main + tag
#   gh release create v<ver> -t v<ver> --notes-from-tag   (or GH UI)
#   → this workflow fires → npm publish
#
# npm Trusted Publisher (one-time):
#   npmjs.com → @blueshed/delta → Publishing access →
#     GitHub Actions: blueshed/delta, workflow: publish.yml, env blank.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Start Postgres
        run: docker compose up -d --wait

      - run: bunx tsc --noEmit

      - run: bun test tests/

      - name: Stop Postgres
        if: always()
        run: docker compose down -v

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: NODE_AUTH_TOKEN="" npm publish --provenance --access public
