name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start Postgres
        run: docker compose up -d --wait

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test tests/

      - name: Stop Postgres
        if: always()
        run: docker compose down -v
