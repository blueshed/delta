services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: delta_test
      POSTGRES_USER: delta
      POSTGRES_PASSWORD: delta
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delta -d delta_test"]
      interval: 1s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql
