# Test-only compose. `tmpfs` keeps the data directory in memory so every
# `docker compose down -v` leaves no state behind — perfect for a CI cycle,
# wrong for an app that needs durable data. Copy this file into your own
# project but replace the `tmpfs` block with a named volume for real use.
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: delta_test
      POSTGRES_USER: delta
      POSTGRES_PASSWORD: delta
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delta -d delta_test"]
      interval: 1s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql   # EPHEMERAL — see comment at top of file
