services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: {{DB}}
      POSTGRES_USER: {{DB}}
      POSTGRES_PASSWORD: {{DB}}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{DB}} -d {{DB}}"]
      interval: 1s
      timeout: 3s
      retries: 20
    volumes:
      - {{DB}}_pgdata:/var/lib/postgresql/data

volumes:
  {{DB}}_pgdata:
